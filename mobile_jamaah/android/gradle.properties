# Batas memori dibuat realistis untuk laptop pengembangan 8 GB agar daemon
# Gradle tidak mengambil hampir seluruh RAM dan berhenti saat build release.
org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.workers.max=2
android.useAndroidX=true
android.enableJetifier=true
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process
